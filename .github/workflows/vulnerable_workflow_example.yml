name: Vulnerable Workflow Example

on:
  workflow_dispatch:
    inputs:
      user_input:
        description: "ユーザー入力（脆弱性テスト用）"
        required: true
        default: "test"

jobs:
  vulnerable_job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show user input safely
        run: |
          echo "User input is: ${{ github.event.inputs.user_input }}"

      - name: ❌ Vulnerable step (for testing)
        run: |
          INPUT="${{ github.event.inputs.user_input }}"
          echo "Running command with user input..."
          eval "echo Listing files: $INPUT"
